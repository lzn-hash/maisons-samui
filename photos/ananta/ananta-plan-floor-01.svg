<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Inter', sans-serif">
  <!-- Fond -->
  <rect width="1200" height="800" fill="#f2ede2"/>

  <!-- Définitions : motifs, hachures, dégradés -->
  <defs>
    <!-- Motif subtil pour le sol -->
    <pattern id="floor" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <rect width="30" height="30" fill="#ebe3d2"/>
      <line x1="0" y1="0" x2="30" y2="0" stroke="#d4c9b4" stroke-width="0.5" opacity="0.4"/>
      <line x1="0" y1="0" x2="0" y2="30" stroke="#d4c9b4" stroke-width="0.5" opacity="0.4"/>
    </pattern>

    <!-- Motif piscine -->
    <pattern id="pool" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="#b8d4d8"/>
      <path d="M 0 10 Q 5 6, 10 10 T 20 10" stroke="#a3c4c9" stroke-width="0.8" fill="none" opacity="0.6"/>
    </pattern>

    <!-- Hachures parking -->
    <pattern id="parking" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
      <rect width="14" height="14" fill="#2d3438"/>
      <line x1="0" y1="14" x2="14" y2="0" stroke="#3d4448" stroke-width="0.8"/>
    </pattern>

    <!-- Terrasse bois -->
    <pattern id="deck" x="0" y="0" width="8" height="60" patternUnits="userSpaceOnUse">
      <rect width="8" height="60" fill="#d4c0a3"/>
      <line x1="0" y1="0" x2="0" y2="60" stroke="#b8a689" stroke-width="0.4" opacity="0.5"/>
    </pattern>
  </defs>

  <!-- ============ TITRE ============ -->
  <text x="70" y="55" font-family="'Italiana', serif" font-size="22" fill="#1a1e1a" letter-spacing="4">VILLA ANANTA</text>
  <text x="70" y="78" font-size="10" fill="#a88852" letter-spacing="3" text-transform="uppercase">REZ-DE-CHAUSSÉE · BOPHUT</text>
  <line x1="70" y1="92" x2="230" y2="92" stroke="#a88852" stroke-width="1"/>

  <!-- Échelle et orientation (nord) -->
  <g transform="translate(820, 55)">
    <circle cx="15" cy="15" r="14" fill="none" stroke="#1a1e1a" stroke-width="0.8"/>
    <path d="M 15 3 L 18 15 L 15 12 L 12 15 Z" fill="#b8623f"/>
    <text x="15" y="8" text-anchor="middle" font-size="8" fill="#1a1e1a" font-weight="500">N</text>
    <text x="40" y="18" font-size="9" fill="#3a3f39" letter-spacing="2">ÉCHELLE 1/100</text>
  </g>

  <!-- ============ PLAN PRINCIPAL ============ -->
  <g transform="translate(70, 120)">

    <!-- Contour extérieur général de la villa -->
    <path d="M 0 80 L 0 430 L 220 430 L 220 510 L 470 510 L 470 430 L 620 430 L 620 0 L 440 0 L 440 80 L 220 80 L 220 0 L 0 0 Z"
          fill="url(#floor)" stroke="#1a1e1a" stroke-width="2.5"/>

    <!-- ==== BALCONY 3 (haut gauche, lounge extérieur) ==== -->
    <rect x="0" y="0" width="220" height="80" fill="url(#deck)" stroke="#1a1e1a" stroke-width="1.5"/>
    <!-- Chaises lounge -->
    <g stroke="#3a3f39" stroke-width="0.8" fill="#faf7f0">
      <rect x="30" y="20" width="50" height="22" rx="3"/>
      <rect x="100" y="20" width="50" height="22" rx="3"/>
    </g>
    <!-- Table basse -->
    <circle cx="170" cy="40" r="10" fill="#c9b88f" stroke="#3a3f39" stroke-width="0.6"/>
    <text x="110" y="62" text-anchor="middle" font-size="9" fill="#3a3f39" letter-spacing="2">TERRASSE</text>

    <!-- ==== CHAMBRE 3 (milieu gauche) ==== -->
    <rect x="0" y="80" width="220" height="170" fill="#ebe3d2" stroke="#1a1e1a" stroke-width="1.5"/>
    <!-- Lit -->
    <g>
      <rect x="45" y="115" width="130" height="90" rx="4" fill="#faf7f0" stroke="#3a3f39" stroke-width="0.8"/>
      <rect x="55" y="125" width="50" height="70" rx="2" fill="#e8e1d4" stroke="#3a3f39" stroke-width="0.5"/>
      <rect x="115" y="125" width="50" height="70" rx="2" fill="#e8e1d4" stroke="#3a3f39" stroke-width="0.5"/>
      <rect x="50" y="108" width="120" height="12" rx="2" fill="#c9b88f" stroke="#3a3f39" stroke-width="0.5"/>
    </g>
    <text x="110" y="235" text-anchor="middle" font-family="'Cormorant Garamond', serif" font-size="14" fill="#1a1e1a" font-style="italic">Chambre 3</text>

    <!-- ==== SDB 3 (bas gauche) ==== -->
    <rect x="0" y="250" width="130" height="100" fill="#e0d6c1" stroke="#1a1e1a" stroke-width="1.5"/>
    <!-- Baignoire -->
    <rect x="15" y="268" width="70" height="30" rx="6" fill="#faf7f0" stroke="#3a3f39" stroke-width="0.8"/>
    <!-- Vasque -->
    <rect x="95" y="270" width="25" height="18" rx="2" fill="#faf7f0" stroke="#3a3f39" stroke-width="0.6"/>
    <!-- WC -->
    <rect x="15" y="310" width="22" height="28" rx="4" fill="#faf7f0" stroke="#3a3f39" stroke-width="0.6"/>
    <text x="70" y="344" text-anchor="middle" font-family="'Cormorant Garamond', serif" font-size="11" fill="#1a1e1a" font-style="italic">SDB 3</text>

    <!-- ==== POMPES (PUMPROOM) ==== -->
    <rect x="130" y="250" width="90" height="100" fill="#dcd1b9" stroke="#1a1e1a" stroke-width="1.5"/>
    <text x="175" y="305" text-anchor="middle" font-size="9" fill="#3a3f39" letter-spacing="1.5">TECHNIQUE</text>

    <!-- ==== PARKING (bas gauche, devant) ==== -->
    <rect x="0" y="350" width="220" height="160" fill="url(#parking)" stroke="#1a1e1a" stroke-width="1.5"/>
    <!-- Lignes de parking -->
    <line x1="73" y1="365" x2="73" y2="495" stroke="#faf7f0" stroke-width="1.5" opacity="0.6"/>
    <line x1="146" y1="365" x2="146" y2="495" stroke="#faf7f0" stroke-width="1.5" opacity="0.6"/>
    <text x="110" y="435" text-anchor="middle" font-size="10" fill="#faf7f0" letter-spacing="3" opacity="0.7">PARKING</text>

    <!-- ==== HALL / DÉGAGEMENT CENTRAL ==== -->
    <rect x="220" y="80" width="220" height="430" fill="#e8e0cf" stroke="#1a1e1a" stroke-width="1.5"/>
    <!-- Motif sol hall -->
    <line x1="220" y1="180" x2="440" y2="180" stroke="#d4c9b4" stroke-width="0.4" stroke-dasharray="2 3"/>
    <line x1="220" y1="300" x2="440" y2="300" stroke="#d4c9b4" stroke-width="0.4" stroke-dasharray="2 3"/>
    <line x1="220" y1="420" x2="440" y2="420" stroke="#d4c9b4" stroke-width="0.4" stroke-dasharray="2 3"/>
    <!-- Escalier -->
    <g transform="translate(260, 380)">
      <rect x="0" y="0" width="120" height="120" fill="#dcd1b9" stroke="#3a3f39" stroke-width="0.8"/>
      <line x1="0" y1="20" x2="120" y2="20" stroke="#3a3f39" stroke-width="0.5"/>
      <line x1="0" y1="40" x2="120" y2="40" stroke="#3a3f39" stroke-width="0.5"/>
      <line x1="0" y1="60" x2="120" y2="60" stroke="#3a3f39" stroke-width="0.5"/>
      <line x1="0" y1="80" x2="120" y2="80" stroke="#3a3f39" stroke-width="0.5"/>
      <line x1="0" y1="100" x2="120" y2="100" stroke="#3a3f39" stroke-width="0.5"/>
      <path d="M 60 10 L 60 110" stroke="#b8623f" stroke-width="1" marker-end="url(#arrow)"/>
      <text x="60" y="140" text-anchor="middle" font-family="'Cormorant Garamond', serif" font-size="11" fill="#1a1e1a" font-style="italic">Escalier</text>
    </g>
    <defs>
      <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
        <path d="M0,0 L8,4 L0,8 Z" fill="#b8623f"/>
      </marker>
    </defs>
    <text x="330" y="230" text-anchor="middle" font-family="'Italiana', serif" font-size="20" fill="#2d4a34">Hall</text>

    <!-- ==== BALCONY 4 / PISCINE (haut droite) ==== -->
    <rect x="440" y="0" width="180" height="250" fill="url(#deck)" stroke="#1a1e1a" stroke-width="1.5"/>
    <!-- Piscine -->
    <rect x="475" y="110" width="110" height="125" rx="4" fill="url(#pool)" stroke="#3a3f39" stroke-width="1"/>
    <!-- Salon / coin repas sur terrasse -->
    <g stroke="#3a3f39" stroke-width="0.6" fill="#faf7f0">
      <circle cx="530" cy="45" r="18"/>
      <rect x="510" y="65" width="18" height="18" rx="2"/>
      <rect x="532" y="65" width="18" height="18" rx="2"/>
      <rect x="490" y="45" width="18" height="18" rx="2"/>
      <rect x="552" y="45" width="18" height="18" rx="2"/>
    </g>
    <text x="530" y="95" text-anchor="middle" font-size="8" fill="#3a3f39" letter-spacing="2">COIN REPAS</text>
    <text x="530" y="175" text-anchor="middle" font-family="'Italiana', serif" font-size="16" fill="#ffffff" opacity="0.9">Piscine</text>
    <text x="530" y="192" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.7" letter-spacing="2">12 × 4 M</text>

    <!-- ==== CHAMBRE 4 (milieu droite) ==== -->
    <rect x="440" y="250" width="180" height="180" fill="#ebe3d2" stroke="#1a1e1a" stroke-width="1.5"/>
    <!-- Lit king size -->
    <g>
      <rect x="465" y="295" width="130" height="95" rx="4" fill="#faf7f0" stroke="#3a3f39" stroke-width="0.8"/>
      <rect x="475" y="305" width="50" height="75" rx="2" fill="#e8e1d4" stroke="#3a3f39" stroke-width="0.5"/>
      <rect x="535" y="305" width="50" height="75" rx="2" fill="#e8e1d4" stroke="#3a3f39" stroke-width="0.5"/>
      <rect x="470" y="288" width="120" height="12" rx="2" fill="#c9b88f" stroke="#3a3f39" stroke-width="0.5"/>
    </g>
    <!-- Chevet -->
    <rect x="455" y="300" width="8" height="20" fill="#c9b88f" stroke="#3a3f39" stroke-width="0.4"/>
    <rect x="597" y="300" width="8" height="20" fill="#c9b88f" stroke="#3a3f39" stroke-width="0.4"/>
    <text x="530" y="418" text-anchor="middle" font-family="'Cormorant Garamond', serif" font-size="14" fill="#1a1e1a" font-style="italic">Suite Parentale</text>

    <!-- ==== SDB 4 (bas droite) ==== -->
    <rect x="440" y="430" width="180" height="80" fill="#e0d6c1" stroke="#1a1e1a" stroke-width="1.5"/>
    <!-- Douche italienne -->
    <rect x="455" y="445" width="50" height="50" fill="#faf7f0" stroke="#3a3f39" stroke-width="0.6"/>
    <line x1="455" y1="445" x2="505" y2="495" stroke="#b8d4d8" stroke-width="0.4"/>
    <line x1="455" y1="470" x2="505" y2="470" stroke="#b8d4d8" stroke-width="0.4"/>
    <line x1="480" y1="445" x2="480" y2="495" stroke="#b8d4d8" stroke-width="0.4"/>
    <!-- Double vasque -->
    <rect x="520" y="450" width="35" height="18" rx="2" fill="#faf7f0" stroke="#3a3f39" stroke-width="0.6"/>
    <rect x="560" y="450" width="35" height="18" rx="2" fill="#faf7f0" stroke="#3a3f39" stroke-width="0.6"/>
    <text x="560" y="500" text-anchor="middle" font-family="'Cormorant Garamond', serif" font-size="11" fill="#1a1e1a" font-style="italic">SDB parentale</text>

  </g>

  <!-- ============ COTATIONS (dimensions en m) ============ -->
  <g font-size="9" fill="#3a3f39" font-weight="400">
    <!-- Haut -->
    <g stroke="#3a3f39" stroke-width="0.5" fill="none">
      <line x1="70" y1="108" x2="290" y2="108"/>
      <line x1="70" y1="104" x2="70" y2="112"/>
      <line x1="290" y1="104" x2="290" y2="112"/>

      <line x1="290" y1="108" x2="510" y2="108"/>
      <line x1="510" y1="104" x2="510" y2="112"/>

      <line x1="510" y1="108" x2="690" y2="108"/>
      <line x1="690" y1="104" x2="690" y2="112"/>
    </g>
    <text x="180" y="102" text-anchor="middle">4.20 m</text>
    <text x="400" y="102" text-anchor="middle">5.30 m</text>
    <text x="600" y="102" text-anchor="middle">4.50 m</text>

    <!-- Bas -->
    <g stroke="#3a3f39" stroke-width="0.5" fill="none">
      <line x1="70" y1="645" x2="290" y2="645"/>
      <line x1="70" y1="641" x2="70" y2="649"/>
      <line x1="290" y1="641" x2="290" y2="649"/>

      <line x1="290" y1="645" x2="540" y2="645"/>
      <line x1="540" y1="641" x2="540" y2="649"/>

      <line x1="540" y1="645" x2="690" y2="645"/>
      <line x1="690" y1="641" x2="690" y2="649"/>
    </g>
    <text x="180" y="660" text-anchor="middle">6.00 m</text>
    <text x="415" y="660" text-anchor="middle">7.30 m</text>
    <text x="615" y="660" text-anchor="middle">4.50 m</text>

    <!-- Gauche -->
    <g stroke="#3a3f39" stroke-width="0.5" fill="none">
      <line x1="55" y1="120" x2="55" y2="370"/>
      <line x1="51" y1="120" x2="59" y2="120"/>
      <line x1="51" y1="370" x2="59" y2="370"/>

      <line x1="55" y1="370" x2="55" y2="470"/>
      <line x1="51" y1="470" x2="59" y2="470"/>

      <line x1="55" y1="470" x2="55" y2="630"/>
      <line x1="51" y1="630" x2="59" y2="630"/>
    </g>
    <text x="40" y="250" text-anchor="middle" transform="rotate(-90 40 250)">6.50 m</text>
    <text x="40" y="425" text-anchor="middle" transform="rotate(-90 40 425)">2.00 m</text>
    <text x="40" y="555" text-anchor="middle" transform="rotate(-90 40 555)">6.00 m</text>

    <!-- Droite -->
    <g stroke="#3a3f39" stroke-width="0.5" fill="none">
      <line x1="705" y1="120" x2="705" y2="370"/>
      <line x1="701" y1="120" x2="709" y2="120"/>
      <line x1="701" y1="370" x2="709" y2="370"/>

      <line x1="705" y1="370" x2="705" y2="550"/>
      <line x1="701" y1="550" x2="709" y2="550"/>
    </g>
    <text x="720" y="250" text-anchor="middle" transform="rotate(90 720 250)">6.00 m</text>
    <text x="720" y="465" text-anchor="middle" transform="rotate(90 720 465)">6.50 m</text>
  </g>

  <!-- ============ LÉGENDE DES SURFACES (à droite) ============ -->
  <g transform="translate(820, 120)">
    <text x="0" y="0" font-family="'Italiana', serif" font-size="14" fill="#1a1e1a" letter-spacing="3">SURFACES</text>
    <text x="0" y="18" font-size="9" fill="#a88852" letter-spacing="2">APPROXIMATIVES · M²</text>
    <line x1="0" y1="32" x2="280" y2="32" stroke="#d4c9b4" stroke-width="0.8"/>

    <!-- Entrées -->
    <g font-size="10" fill="#3a3f39">
      <text x="0" y="55">Cuisine · Salle à manger · Salon</text>
      <text x="280" y="55" text-anchor="end" font-family="'Italiana', serif" font-size="12" fill="#2d4a34">70,50</text>
      <line x1="0" y1="65" x2="280" y2="65" stroke="#ebe3d2" stroke-width="0.5"/>

      <text x="0" y="83">Suite parentale</text>
      <text x="280" y="83" text-anchor="end" font-family="'Italiana', serif" font-size="12" fill="#2d4a34">32,40</text>
      <line x1="0" y1="93" x2="280" y2="93" stroke="#ebe3d2" stroke-width="0.5"/>

      <text x="0" y="111">Salle de bain parentale</text>
      <text x="280" y="111" text-anchor="end" font-family="'Italiana', serif" font-size="12" fill="#2d4a34">15,75</text>
      <line x1="0" y1="121" x2="280" y2="121" stroke="#ebe3d2" stroke-width="0.5"/>

      <text x="0" y="139">Chambre 2 · 3 · 4</text>
      <text x="280" y="139" text-anchor="end" font-family="'Italiana', serif" font-size="12" fill="#2d4a34">82,95</text>
      <line x1="0" y1="149" x2="280" y2="149" stroke="#ebe3d2" stroke-width="0.5"/>

      <text x="0" y="167">Salles d'eau 2 · 3 · 4</text>
      <text x="280" y="167" text-anchor="end" font-family="'Italiana', serif" font-size="12" fill="#2d4a34">26,20</text>
      <line x1="0" y1="177" x2="280" y2="177" stroke="#ebe3d2" stroke-width="0.5"/>

      <text x="0" y="195">Balcons · Terrasses</text>
      <text x="280" y="195" text-anchor="end" font-family="'Italiana', serif" font-size="12" fill="#2d4a34">44,35</text>
      <line x1="0" y1="205" x2="280" y2="205" stroke="#ebe3d2" stroke-width="0.5"/>

      <text x="0" y="223">Hall · Buanderie · Local technique</text>
      <text x="280" y="223" text-anchor="end" font-family="'Italiana', serif" font-size="12" fill="#2d4a34">65,00</text>
      <line x1="0" y1="233" x2="280" y2="233" stroke="#ebe3d2" stroke-width="0.5"/>
    </g>

    <!-- Totaux intérieur -->
    <g transform="translate(0, 260)">
      <rect x="0" y="0" width="280" height="40" fill="#e8e0cf"/>
      <text x="15" y="26" font-size="10" fill="#1a1e1a" letter-spacing="2">TOTAL INTÉRIEUR</text>
      <text x="265" y="26" text-anchor="end" font-family="'Italiana', serif" font-size="18" fill="#1a1e1a">337,15</text>
    </g>

    <!-- Extérieur -->
    <g transform="translate(0, 320)" font-size="10" fill="#3a3f39">
      <text x="0" y="0">Piscine</text>
      <text x="280" y="0" text-anchor="end" font-family="'Italiana', serif" font-size="12" fill="#2d4a34">36,40</text>
      <line x1="0" y1="10" x2="280" y2="10" stroke="#ebe3d2" stroke-width="0.5"/>

      <text x="0" y="28">Terrasse</text>
      <text x="280" y="28" text-anchor="end" font-family="'Italiana', serif" font-size="12" fill="#2d4a34">51,10</text>
      <line x1="0" y1="38" x2="280" y2="38" stroke="#ebe3d2" stroke-width="0.5"/>

      <text x="0" y="56">Parking</text>
      <text x="280" y="56" text-anchor="end" font-family="'Italiana', serif" font-size="12" fill="#2d4a34">36,00</text>
      <line x1="0" y1="66" x2="280" y2="66" stroke="#ebe3d2" stroke-width="0.5"/>
    </g>

    <!-- Totaux extérieur -->
    <g transform="translate(0, 395)">
      <rect x="0" y="0" width="280" height="40" fill="#e8e0cf"/>
      <text x="15" y="26" font-size="10" fill="#1a1e1a" letter-spacing="2">TOTAL EXTÉRIEUR</text>
      <text x="265" y="26" text-anchor="end" font-family="'Italiana', serif" font-size="18" fill="#1a1e1a">123,50</text>
    </g>

    <!-- Total général -->
    <g transform="translate(0, 455)">
      <rect x="0" y="0" width="280" height="52" fill="#2d4a34"/>
      <text x="15" y="22" font-size="9" fill="#a88852" letter-spacing="3">SURFACE NIVEAU</text>
      <text x="15" y="42" font-family="'Italiana', serif" font-size="22" fill="#faf7f0">460,65 m²</text>
    </g>

    <!-- Note de bas -->
    <text x="0" y="540" font-family="'Cormorant Garamond', serif" font-size="11" fill="#3a3f39" font-style="italic">Plan à titre indicatif — dimensions susceptibles de légères variations.</text>
  </g>

  <!-- Footer -->
  <text x="70" y="770" font-size="9" fill="#a88852" letter-spacing="3">MAISONS SAMUI</text>
  <text x="1130" y="770" text-anchor="end" font-size="9" fill="#3a3f39" letter-spacing="2">PLAN 01 · REZ-DE-CHAUSSÉE</text>
</svg>
